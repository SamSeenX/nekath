<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Avurudu Nekath</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="bg-slate-900 m-0 p-0 overflow-x-hidden">

    <div id="app-container" class="min-h-screen md:h-screen md:overflow-hidden w-full flex flex-col text-white transition-all duration-1000 ease-in-out bg-gradient-to-br from-slate-800 to-slate-900">
        
        <!-- Background Overlay -->
        <div class="absolute inset-0 bg-black/20 pointer-events-none"></div>

        <!-- Main Content -->
        <div class="relative z-10 flex flex-col flex-grow w-full max-w-lg mx-auto md:max-w-5xl px-6 py-8 md:py-6 h-full md:flex-row md:items-center md:gap-12">
            
            <!-- Left Side: Hero & Countdown -->
            <div class="flex-1 flex flex-col justify-center mb-8 md:mb-0 h-full py-4">
                
                <!-- Header -->
                <div class="flex justify-between items-start mb-8 md:mb-4">
                    <div>
                        <div class="flex items-center gap-2 text-white/80 font-medium mb-1">
                            <i data-lucide="map-pin" class="w-4 h-4"></i>
                            <span>Sri Lanka</span>
                        </div>
                        <h2 id="current-date" class="text-xl font-semibold">--</h2>
                        <p class="text-white/60 text-sm mt-1 flex items-center gap-1.5">
                            <i data-lucide="clock" class="w-3.5 h-3.5"></i> Local Time: <span id="current-time">--</span>
                        </p>
                    </div>
                </div>

                <!-- Punya Kaalaya Banner -->
                <div id="punya-banner" class="hidden items-center gap-2 bg-white/20 backdrop-blur-md border border-white/30 text-white px-4 py-2 rounded-full text-sm font-medium mb-8 md:mb-6 self-start animate-pulse shadow-lg">
                    <i data-lucide="moon" class="w-4 h-4 text-yellow-200"></i>
                    Punya Kaalaya is Active
                </div>

                <!-- Active Hero -->
                <div id="hero-active" class="flex flex-col items-start hidden">
                    <p class="text-white/70 uppercase tracking-widest text-xs font-bold mb-4 md:mb-2 flex items-center gap-2">
                        Upcoming Nekatha
                    </p>
                    
                    <div class="flex items-center gap-4 mb-4 md:mb-2">
                        <div id="hero-icon-wrapper"></div>
                        <h1 id="hero-title" class="text-4xl md:text-5xl font-bold leading-tight drop-shadow-md">
                            --
                        </h1>
                    </div>

                    <div id="countdown-timer" class="text-7xl md:text-[6rem] font-light tracking-tighter drop-shadow-lg tabular-nums my-4 md:my-2 leading-none">
                        00:00:00
                    </div>
                    
                    <p id="days-left" class="text-xl text-white/80 font-medium mb-4 md:mb-2 hidden">
                        <!-- Populated by JS -->
                    </p>

                    <p id="hero-desc" class="text-lg text-white/90 max-w-md font-medium leading-relaxed bg-black/10 p-4 rounded-xl border border-white/10 shadow-inner">
                        --
                    </p>

                    <!-- Details Grid -->
                    <div class="grid grid-cols-2 gap-4 mt-8 md:mt-6 w-full max-w-md">
                        <div class="bg-white/10 backdrop-blur-lg border border-white/20 rounded-2xl p-4 flex flex-col hover:bg-white/15 transition-colors">
                            <div class="flex items-center gap-2 text-white/60 text-sm mb-2">
                                <i data-lucide="palette" class="w-4 h-4"></i> Color
                            </div>
                            <div id="hero-color" class="text-xl font-semibold">--</div>
                        </div>
                        <div class="bg-white/10 backdrop-blur-lg border border-white/20 rounded-2xl p-4 flex flex-col hover:bg-white/15 transition-colors">
                            <div class="flex items-center gap-2 text-white/60 text-sm mb-2">
                                <i data-lucide="compass" class="w-4 h-4"></i> Direction
                            </div>
                            <div id="hero-direction" class="text-xl font-semibold">--</div>
                        </div>
                    </div>
                </div>

                <!-- Completed Hero -->
                <div id="hero-completed" class="flex flex-col items-center justify-center text-center py-20 hidden">
                    <i data-lucide="check-circle-2" class="w-16 h-16 mb-4 text-emerald-400"></i>
                    <h1 class="text-4xl font-bold mb-2">Avurudu Completed!</h1>
                    <p class="text-white/70">Suba Aluth Avuruddak Wewa.</p>
                </div>

            </div>

            <!-- Right Side: Timeline List -->
            <div class="flex-1 w-full bg-black/20 backdrop-blur-xl border border-white/10 rounded-3xl p-6 shadow-2xl overflow-hidden flex flex-col min-h-[80vh] md:min-h-0 md:h-[85vh]">
                <h3 class="text-lg font-semibold mb-6 flex items-center gap-2 shrink-0">
                    <i data-lucide="info" class="w-4 h-4"></i> Schedule 2026
                </h3>
                
                <div id="schedule-list" class="overflow-y-auto pr-2 custom-scrollbar flex-grow space-y-4">
                    <!-- Populated by JS -->
                </div>
            </div>

        </div>
    </div>

    <!-- Application Logic -->
    <script src="./js/data.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
